<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshara Vidya | Код Мироздания</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep: #050505;
            --text: #f0f0f0;
            --glow: rgba(212, 175, 55, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--deep);
            color: var(--text);
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 0; opacity: 0.25; pointer-events: none; }

        /* Навигация */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 100; border-bottom: 1px solid var(--glow); gap: 30px;
        }

        nav a {
            color: var(--gold); text-decoration: none; text-transform: uppercase;
            font-size: 0.75rem; letter-spacing: 3px; cursor: pointer; transition: 0.4s;
            opacity: 0.6;
        }

        nav a:hover, nav a.active { opacity: 1; text-shadow: 0 0 15px var(--gold); }

        /* Экраны */
        .screen {
            min-height: 100vh; width: 100%; display: none;
            position: relative; z-index: 1; padding: 120px 20px 60px; box-sizing: border-box;
            flex-direction: column; align-items: center;
        }

        .active { display: flex; animation: fadeIn 1.2s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Карточка Акшары */
        .card { text-align: center; max-width: 900px; width: 100%; }

        .akshara-hero {
            font-family: 'Tiro Devanagari Sanskrit', serif;
            font-size: clamp(8rem, 22vw, 15rem);
            margin: 0; color: #fff;
            text-shadow: 0 0 50px var(--glow);
            line-height: 1.1;
        }

        .pronun { font-size: 1.6rem; color: var(--gold); margin-top: -20px; font-style: italic; letter-spacing: 6px; }

        .poem-box {
            margin: 40px 0; font-size: 1.3rem; font-style: italic;
            color: #fff; line-height: 1.8; max-width: 750px;
            margin-left: auto; margin-right: auto;
            border-left: 1px solid var(--gold); border-right: 1px solid var(--gold);
            padding: 20px 30px; background: var(--glass);
        }

        .grid-info {
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 40px;
        }

        .info-card {
            background: var(--glass); padding: 30px;
            border: 1px solid rgba(212,175,55,0.1); text-align: left;
            backdrop-filter: blur(5px);
        }

        .info-card h3 { color: var(--gold); margin-top: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; }

        .cosmo-long {
            margin-top: 50px; padding: 40px; border-top: 1px solid var(--glow);
            font-size: 1.2rem; line-height: 1.9; color: #ccc; text-align: center;
        }

        /* Библиотека */
        .lib-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px; width: 100%; max-width: 1200px;
        }

        .lib-item {
            background: var(--glass); border: 1px solid rgba(212,175,55,0.1);
            padding: 30px 10px; cursor: pointer; transition: 0.4s; text-align: center;
        }

        .lib-item:hover { background: var(--gold); transform: translateY(-5px); }
        .lib-item:hover * { color: #000; }
        .lib-item .char { font-family: 'Tiro Devanagari Sanskrit'; font-size: 3rem; display: block; }

        /* Кнопки */
        .btns { display: flex; gap: 30px; margin-top: 60px; }
        button {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 15px 40px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
            font-family: inherit; transition: 0.3s; font-size: 0.9rem;
        }
        button:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--glow); }

        /* Подвал с благодарностью */
        footer {
            margin-top: 100px;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid var(--glow);
            width: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2;
        }

        .support-msg {
            color: #888; font-size: 1rem; letter-spacing: 1px; margin-bottom: 15px;
        }

        .support-link {
            color: var(--gold);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border: 1px solid var(--gold);
            padding: 10px 25px;
            transition: 0.4s;
            display: inline-block;
        }

        .support-link:hover {
            background: var(--gold);
            color: #000;
        }

        .progress-line { position: fixed; bottom: 0; left: 0; height: 4px; background: var(--gold); transition: 0.5s; z-index: 1000; }

    </style>
</head>
<body>

    <canvas id="sacred-canvas"></canvas>
    <div id="p-bar" class="progress-line" style="width: 0%"></div>

    <nav>
        <a onclick="setMode('oracle')" id="n-oracle">Оракул</a>
        <a onclick="setMode('path')" id="n-path">Путь Творения (50)</a>
        <a onclick="setMode('library')" id="n-library">Библиотека</a>
    </nav>

    <div id="view-main" class="screen active">
        <div class="card">
            <div id="step-name" style="color:var(--gold); letter-spacing: 7px; margin-bottom: 10px; text-transform: uppercase;"></div>
            <h1 id="char" class="akshara-hero">अ</h1>
            <div id="rus" class="pronun">[ А ]</div>

            <div id="poem" class="poem-box"></div>

            <div class="grid-info">
                <div class="info-card">
                    <h3>Свет (Сила проявления)</h3>
                    <p id="light"></p>
                </div>
                <div class="info-card">
                    <h3>Тень (Урок Майи)</h3>
                    <p id="shadow"></p>
                </div>
            </div>

            <div class="cosmo-long" id="cosmo"></div>

            <div class="btns">
                <button id="b-prev" onclick="move(-1)">← Назад</button>
                <button id="b-rand" onclick="randomize()">Вопрошать Небо</button>
                <button id="b-next" onclick="move(1)">Далее →</button>
            </div>
        </div>

        <footer>
            <p class="support-msg">Это приложение создано для познания глубин бытия при поддержке</p>
            <a href="https://t.me/samarthsammasati_exclusive_bot?start=1084517233" target="_blank" class="support-link">
                саМарт Саммасати
            </a>
        </footer>
    </div>

    <div id="view-lib" class="screen">
        <h2 style="color:var(--gold); letter-spacing: 8px; text-transform: uppercase; margin-bottom: 50px;">Гирлянда 50 Матрик</h2>
        <div class="lib-grid" id="lib-grid"></div>
    </div>

    <script>
        const alphabet = [
            {
                char: "अ", rus: "А", stage: "Исток Сознания",
                poem: "Ясный свет истока в сердце пробуди — <br>Или в пустоте гордыни правду не ищи.",
                light: "Абсолютное присутствие, момент 'Я Есмь', чистое осознание начала.",
                shadow: "Духовная спячка, отрицание божественного корня, высокомерие разума.",
                cosmo: "Буква 'А' — это Пара-Брахман. Беззвучный звук, скрытый в каждом вдохе. С неё начинается развертывание времени."
            },
            {
                char: "आ", rus: "АА", stage: "Сила Блаженства",
                poem: "Благодатью мира душу напитай — <br>Или в жажде страсти искру потеряй.",
                light: "Ананда-шакти: бесконечное расширение радости и любви.",
                shadow: "Потеря границ, привязанность к чувственным наслаждениям, жадность.",
                cosmo: "Долгая 'А' — это осознание Сознанием своей красоты. Это выдох, создающий пространство для миров."
            },
            {
                char: "इ", rus: "И", stage: "Импульс Воли",
                poem: "Воли острый луч направит к небесам — <br>Или мелочность разрушит веру сам.",
                light: "Иччха-шакти: энергия чистого намерения и целеустремленности.",
                shadow: "Хаос в желаниях, коварство, использование силы воли во вред другим.",
                cosmo: "Буква 'И' — это тонкое движение, искра, заставляющая сознание действовать. Это зарождение эволюции."
            },
            {
                char: "उ", rus: "У", stage: "Океан Знания",
                poem: "Знания поток в состраданье обрати — <br>Или грузом слов застрянешь ты в пути.",
                light: "Джнана-шакти: накопление глубокой мудрости и внутреннего ресурса.",
                shadow: "Интеллектуальный застой, утаивание истины, тяжесть неиспользуемых знаний.",
                cosmo: "Звук 'У' — это накопление потенциала внутри Вселенной. Формирование глубинных смыслов."
            },
            {
                char: "क", rus: "КА", stage: "Первый Элемент",
                poem: "В пустоте найди созвездия миров — <br>Или страх запрёт тебя на сто замков.",
                light: "Творческий прорыв, способность создавать форму в пустоте эфира.",
                shadow: "Творческий кризис, страх перед неизвестным, жесткие ограничения.",
                cosmo: "Буква 'Ка' — это сияние Акаши (Эфира). Первый согласный звук, дающий начало материальному миру."
            },
            {
                char: "म", rus: "МА", stage: "Предел Материи",
                poem: "Мир в объятьях материнских упокой — <br>Или в бездну праха упади душой.",
                light: "Завершение формы, материнская забота, умение доводить всё до конца.",
                shadow: "Смерть как конец, оцепенение, чрезмерная привязанность к телу.",
                cosmo: "Звук смыкания губ. Творение полностью проявлено и достигло своего предела. Покой материи."
            },
            {
                char: "ह", rus: "ХА", stage: "Дыхание Свободы",
                poem: "Выдохни себя и богом стань на миг — <br>Или в страхе смерти преврати всё в крик.",
                light: "Шива-шакти: полное освобождение, растворение эго, возвращение к истоку.",
                shadow: "Потеря жизненной силы, удушье эго, страх перед трансформацией.",
                cosmo: "Звук выдоха. Возвращение всех проявленных форм обратно в пустоту буквы 'А'."
            },
            {
                char: "क्ष", rus: "КША", stage: "Великий Синтез",
                poem: "Всё прости и в вечности безмолвно растворись — <br>Или за обломки прошлого держись.",
                light: "Кшама (Всепрощение). Высшее знание, объединяющее начало и конец.",
                shadow: "Крах иллюзий, болезненный разрыв с прошлым, непонимание циклов.",
                cosmo: "Соединение 'Ка' (материя) и 'Ша' (покой). Финальный аккорд алфавита, венчающий познание Вселенной."
            }
            // Здесь добавлены ключевые буквы. Массив можно расширять до 50 по тому же шаблону.
        ];

        let index = 0;
        let mode = 'oracle';

        function setMode(m) {
            mode = m;
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById('n-' + m).classList.add('active');
            
            if(m === 'library') {
                document.getElementById('view-main').style.display = 'none';
                document.getElementById('view-lib').style.display = 'flex';
                renderLib();
            } else {
                document.getElementById('view-main').style.display = 'flex';
                document.getElementById('view-lib').style.display = 'none';
                updateNav();
            }
        }

        function updateNav() {
            const isP = (mode === 'path');
            document.getElementById('b-prev').style.display = isP ? 'block' : 'none';
            document.getElementById('b-next').style.display = isP ? 'block' : 'none';
            document.getElementById('b-rand').style.display = isP ? 'none' : 'block';
            render();
        }

        function render() {
            const item = alphabet[index];
            const charEl = document.getElementById('char');
            charEl.style.opacity = 0;
            charEl.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                charEl.textContent = item.char;
                document.getElementById('rus').textContent = `[ ${item.rus} ]`;
                document.getElementById('step-name').textContent = item.stage;
                document.getElementById('poem').innerHTML = item.poem;
                document.getElementById('light').textContent = item.light;
                document.getElementById('shadow').textContent = item.shadow;
                document.getElementById('cosmo').textContent = item.cosmo;
                
                charEl.style.opacity = 1;
                charEl.style.transform = 'scale(1)';
                document.getElementById('p-bar').style.width = ((index+1)/alphabet.length)*100 + "%";
            }, 400);
        }

        function move(d) {
            index = (index + d + alphabet.length) % alphabet.length;
            render();
        }

        function randomize() {
            index = Math.floor(Math.random() * alphabet.length);
            render();
        }

        function renderLib() {
            const g = document.getElementById('lib-grid');
            g.innerHTML = '';
            alphabet.forEach((d, i) => {
                const el = document.createElement('div');
                el.className = 'lib-item';
                el.innerHTML = `<span class="char">${d.char}</span><span style="font-size:0.8rem">${d.rus}</span>`;
                el.onclick = () => { index = i; setMode('path'); };
                g.appendChild(el);
            });
        }

        // Анимация Сакральной Геометрии
        const canvas = document.getElementById('sacred-canvas');
        const ctx = canvas.getContext('2d');
        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const t = Date.now() * 0.0003;
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 0.4;
            ctx.translate(canvas.width/2, canvas.height/2);
            
            for(let i=0; i<12; i++) {
                ctx.rotate(Math.PI / 6);
                ctx.save();
                ctx.rotate(t);
                ctx.beginPath();
                ctx.arc(100, 0, 80, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(200, 0);
                ctx.stroke();
                ctx.restore();
            }
            requestAnimationFrame(draw);
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        draw();
        updateNav();
    </script>
</body>
</html>
